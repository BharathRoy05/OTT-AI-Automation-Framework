[pytest]
addopts = -ra --strict-markers --alluredir=reports/allure-results
testpaths =
    selenium_framework/tests
    playwright_framework/tests
    ai_engine
markers =
    selenium: Selenium WebDriver regression tests
    playwright: Playwright fast browser tests
    smoke: Critical smoke tests
    regression: Full regression tests
    ai: AI or rules-engine tests
    login: Login module tests
    home: Home page module tests
    search: Search module tests
    video: Video player module tests
    subscription: Subscription module tests
    ui: Tests that require a deployed OTT web application
